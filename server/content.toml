# Spell magnitudes, scaled to the 0-7 volatility range and P~10 pots.
[spell_values]
dampen = 3       # -3 cauldron volatility
surge = 3        # +3 cauldron volatility
cap_max = 3      # a Capped detonator eats at most -3
hex_bonus = 5    # the hexed take -5 extra on any explosion
harvest_bonus = 3 # +3 on top of a won pot
forage_draws = 2 # Forage draws 2 spells

# ---- The Apothecary (boom2-apothecary): realizer caps + bucket families ----
#
# Buckets feed AVAILABILITY, not distribution: a bucket makes its family
# eligible; the realizer composes the fixed-size deck (pantry 30 / grimoire 20)
# and enforces every cap, so any legal pick-set yields a legal deck. Premium
# caps are ABSOLUTE (a bigger deck adds commons, not premium). The realizer's
# commons filler is the Sage + Mint families (the own-colour staples).
# Every number here is `[needs playtesting]`.

[apothecary]
toolkit_cap = 7   # off-colour + wild cards, <=25% of the 30-card pantry
treasure_cap = 3  # 3-point ingredients, absolute
god_tier_cap = 2  # Peek / the Wards, absolute (~10% of the 20-spell grimoire)

# Pantry bucket families: the archetypes the realizer rolls from per bucket.
# Colour slots derive from the bucket (Ochre -> off-colour, Wisp -> wild, the
# rest -> own colour). Volatility 0-7, points 0-3 (3 = Treasure, capped).

[[pantry_bucket]]
bucket = "Sage" # low-volatility own-colour safe pushes
cards = [
  { volatility = 0, points = 1 },
  { volatility = 1, points = 1 },
  { volatility = 1, points = 2 },
]

[[pantry_bucket]]
bucket = "Mint" # balanced mid-vol / mid-point own-colour
cards = [
  { volatility = 2, points = 1 },
  { volatility = 2, points = 2 },
  { volatility = 3, points = 2 },
]

[[pantry_bucket]]
bucket = "Nightshade" # high-volatility own-colour weapons
cards = [
  { volatility = 5, points = 1 },
  { volatility = 6, points = 1 },
  { volatility = 7, points = 1 },
]

[[pantry_bucket]]
bucket = "Saffron" # high-point own-colour treasure (realizer caps at 3)
cards = [
  { volatility = 2, points = 3 },
  { volatility = 3, points = 3 },
  { volatility = 4, points = 3 },
]

[[pantry_bucket]]
bucket = "Chalk" # 0-point ghosts: volatility + colour presence, no prize
cards = [
  { volatility = 1, points = 0 },
  { volatility = 2, points = 0 },
  { volatility = 4, points = 0 },
]

[[pantry_bucket]]
bucket = "Bilberry" # greedy own-colour: high-vol AND high-point
cards = [
  { volatility = 4, points = 2 },
  { volatility = 5, points = 2 },
  { volatility = 6, points = 3 },
]

[[pantry_bucket]]
bucket = "Ochre" # off-colour toolkit (kingmake / misdirect)
cards = [
  { volatility = 1, points = 2 },
  { volatility = 2, points = 1 },
  { volatility = 4, points = 3 },
]

[[pantry_bucket]]
bucket = "Wisp" # wilds: colourless pure danger / go-neutral
cards = [
  { volatility = 2, points = 0 },
  { volatility = 3, points = 0 },
  { volatility = 7, points = 0 },
]

# Bramble = named-combo pairs (boom2-compounding): the Sage+Mint pair pays +2
# points when BOTH halves are in the pot (one half for a Herbalist; an Alchemist
# also adds volatility). A lone half is a plain card — bonus, never requirement.
# A plain filler keeps the bucket from being pure pair-halves. [needs playtesting]
[[pantry_bucket]]
bucket = "Bramble"
cards = [
  { volatility = 2, points = 1, compounding = { kind = "Combo", pair = "SageMint", half = "A" } },
  { volatility = 3, points = 1, compounding = { kind = "Combo", pair = "SageMint", half = "B" } },
  { volatility = 3, points = 2 },
]

# Honey = count-threshold cards (boom2-compounding): +1 point per card in the pot
# past the 5th, keyed off the PUBLIC card count (plannable). A Distiller treats
# the pot as 2 cards larger. The vol-3 card is a plain filler. [needs playtesting]
[[pantry_bucket]]
bucket = "Honey"
cards = [
  { volatility = 1, points = 1, compounding = { kind = "CountThreshold", past = 5, per_card = 1 } },
  { volatility = 2, points = 2, compounding = { kind = "CountThreshold", past = 5, per_card = 1 } },
  { volatility = 3, points = 2 },
]

[[pantry_bucket]]
bucket = "Hellebore" # ultra-low-vol tiptoe (dodge detonator liability)
cards = [
  { volatility = 0, points = 1 },
  { volatility = 0, points = 2 },
  { volatility = 1, points = 2 },
]

[[pantry_bucket]]
bucket = "Embercap" # escalating cards (teeth land with boom2-compounding)
cards = [
  { volatility = 3, points = 1 },
  { volatility = 4, points = 1 },
  { volatility = 5, points = 2 },
]

