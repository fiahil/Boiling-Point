[grimoire]
size = 20
# Drawn at round start; not replenished in-round (except Forage); carry over.
spells_per_round = 3

[[spell]]
kind = "Peek"
copies = 2
[[spell]]
kind = "Expose"
copies = 1
[[spell]]
kind = "Assay"
copies = 1
[[spell]]
kind = "Dampen"
copies = 2
[[spell]]
kind = "Surge"
copies = 2
[[spell]]
kind = "Quench"
copies = 1
[[spell]]
kind = "Cap"
copies = 2
[[spell]]
kind = "Halve"
copies = 1
[[spell]]
kind = "Redirect"
copies = 1
[[spell]]
