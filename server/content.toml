# Boiling Point — default content / balance configuration (boom2 combat core).
#
# Every number here is a STARTING hypothesis: `[needs playtesting]`. The bot
# balance harness re-derives the blind-volatility economy from scratch (the old
# v1 tuning — boiling point 8–14, volatility 1–3 — does not carry over). The
# server validates this file at startup and refuses to run if it is inconsistent
# (see `config::ContentConfig::validate`).
#
# Two decks per player. Since boom2-apothecary the live deck source is the
# REALIZER: players draft 2-3 buckets per ledger and the server composes a
# fixed-size, capped, colour-anchored deck from the [[pantry_bucket]] families
# below (grimoire role-groups are protocol metadata), re-rolled every game.
# The fixed [[ingredient]]/[[spell]] decks below remain as the harness/teaching
# fallback (games constructed without recipes deal them unchanged):
# - the PANTRY: 30 ingredients, colour-anchored (~75% own colour + a toolkit of
#   off-colour and wild cards), instantiated per player from the slots below;
# - the GRIMOIRE: 20 spells across the 15 kinds, hoarded (drawn at round start).

[timing]
wave1_ms = 25000
wave_ms = 15000
# The pre-game brewer pick (1 of 2); closes early once all four picks land.
brewer_pick_ms = 20000
# The pre-game Apothecary draft (two ledgers + reserve); closes early once all
# four recipes land; a straggler gets the frame's suggested quick-pick.
draft_ms = 30000

[boiling_point]
# The load-bearing dial. The design's starting window was 20-32; the revived
# bot harness swept 20-44 against the ~45% explosion-rate target and landed on
# 31-43 (45.3%/43.5%/45.3% across seeds 42/7/1234, 1000 games each, baseline
# bots) — rounds run longer (~5.8 waves) than the design's up-to-4-card-wave
# sketch, so the line sits higher. Still `[needs playtesting]` by humans.
min = 31
max = 43

# ---- The pantry: 30 ingredients per player ----
#
# `slot` says how the deck builder instantiates the card for a seat:
#   Own      -> the player's own colour (the Vote workhorses)
#   OffColor -> another player's colour (kingmake / misdirect toolkit)
#   Wild     -> colourless (pure danger / go-neutral; never scores)
# Volatility is 0-7 skewed low (5-7 are rare weapons); points 0-3.

[pantry]
size = 30
# The colour anchor: the share of Own-slot cards must sit in this band (~75%).
own_min = 0.70
own_max = 0.80

# Own colour (22 = ~73%)
[[ingredient]]
slot = "Own"
volatility = 0
points = 1
copies = 3
[[ingredient]]
slot = "Own"
volatility = 1
points = 1
copies = 4
[[ingredient]]
slot = "Own"
volatility = 2
points = 1
copies = 3
[[ingredient]]
slot = "Own"
volatility = 2
points = 2
copies = 3
[[ingredient]]
slot = "Own"
volatility = 3
points = 1
copies = 3
[[ingredient]]
slot = "Own"
volatility = 3
points = 2
copies = 2
[[ingredient]]
slot = "Own"
volatility = 4
points = 2
copies = 2
[[ingredient]]
slot = "Own"
volatility = 5
points = 3
copies = 1
[[ingredient]]
slot = "Own"
volatility = 6
points = 0
copies = 1

# Off-colour toolkit (5)
[[ingredient]]
slot = "OffColor"
volatility = 1
points = 2
copies = 2
[[ingredient]]
slot = "OffColor"
volatility = 2
points = 1
copies = 2
[[ingredient]]
slot = "OffColor"
volatility = 4
points = 3
copies = 1

# Wilds (3) — volatility only, no points, no dominance.
[[ingredient]]
slot = "Wild"
volatility = 2
points = 0
copies = 1
[[ingredient]]
slot = "Wild"
volatility = 3
points = 0
copies = 1
[[ingredient]]
slot = "Wild"
volatility = 7
points = 0
copies = 1

