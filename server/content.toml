# Boiling Point — default content / balance configuration.
#
# Every number here is a STARTING hypothesis: `[needs playtesting]`. The bot
# balance harness tunes these. The server validates this file at startup and
# refuses to run if it is inconsistent (see `config::ContentConfig::validate`).
#
# Deck composition (90 cards): 56 plain colour cards + 13 wild + 21 effect cards.

[deck]
size = 90

[deck.ratio_bounds]
effect_min = 0.15
effect_max = 0.35
wild_min = 0.10
wild_max = 0.20

[timing]
wave1_ms = 45000
wave_ms = 30000

[boiling_point]
min = 8
max = 14

