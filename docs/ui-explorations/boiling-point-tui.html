<!doctype html>
<!--
  Boiling Point — TERMINAL-FAITHFUL UI EXPLORATION (not the shipping client)
  ────────────────────────────────────────────────────────────────────────────
  A second sketch, honest to the medium: everything is drawn into a fixed
  monospace CELL BUFFER (cols×rows), exactly like ratatui's frame buffer. Only
  glyphs a terminal can render are used — box-drawing, half-blocks, braille,
  width-1 geometric sigils — and the colours are the real truecolor values from
  tui-client/src/palette.rs. Animations are frame redraws (what on_tick drives).

  Demonstrates the agreed direction:
    • a LIVE INSPECTOR that explains the cursor card (the terminal "tooltip")
    • richer, more readable cards (loud volatility, colour band, points pips, name)
    • ambient cauldron motion that carries NO information (blind by design)
    • the depile flip-reveal + crossing crack, and the boom

  Nothing ships; the real client is the Rust/ratatui TUI. Open in a browser:
  ←/→ move the cursor (or click a card), tabs switch scenes, ▶ replays.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boiling Point — terminal preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Spectral+SC:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{ --brass:#c69749; --brass-lt:#ecd39a; --ember:#e68c28; --bg:#0d0c10; --muted:#6b6253; }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:
      radial-gradient(120% 80% at 50% 120%, rgba(230,140,40,.10), transparent 55%),
      #08070a;
    color:#cfc6b4;font-family:"Spectral SC","Spectral",serif;display:flex;flex-direction:column;
    align-items:center;padding:26px 16px 60px}
  h1{font-family:"Spectral SC",serif;letter-spacing:.16em;font-weight:600;font-size:15px;color:var(--brass-lt);
     text-transform:uppercase;margin:0 0 2px}
  .sub{color:var(--muted);font-size:13px;font-style:italic;font-family:"Spectral",serif;margin-bottom:16px}
  .toolbar{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap;justify-content:center}
  .tab,.rbtn{cursor:pointer;font-family:"Spectral SC",serif;letter-spacing:.12em;text-transform:uppercase;
     font-size:11px;color:var(--brass);background:#1b1610;border:1px solid rgba(198,151,73,.25);
     border-radius:7px;padding:8px 13px;transition:.15s}
  .tab:hover,.rbtn:hover{color:var(--brass-lt);border-color:var(--brass);transform:translateY(-1px)}
  .tab.on{color:#100d09;background:linear-gradient(180deg,var(--brass-lt),var(--brass));border-color:var(--brass-lt)}
  .rbtn{color:var(--ember)}
  .hintline{color:var(--muted);font-size:12px;font-style:italic;font-family:"Spectral",serif;margin:10px 0 0;height:16px}

  /* terminal bezel */
  .term{border-radius:12px;border:1px solid rgba(198,151,73,.3);
     box-shadow:0 30px 70px rgba(0,0,0,.6), inset 0 0 0 1px rgba(0,0,0,.6);
     background:#161310;overflow:hidden;max-width:96vw}
  .titlebar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#1d1813;
     border-bottom:1px solid rgba(0,0,0,.5)}
  .dot{width:11px;height:11px;border-radius:50%}
  .d1{background:#e2574b}.d2{background:#e6b13b}.d3{background:#46c25f}
  .titlebar .t{margin-left:8px;color:var(--muted);font-family:"JetBrains Mono",monospace;font-size:12px}
  #screen{margin:0;font-family:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,monospace;
     font-size:14px;line-height:1.16;letter-spacing:0;white-space:pre;background:var(--bg);
     padding:12px 14px;color:#cfc6b4;outline:none;cursor:default}
  /* faint screen glow + scanlines for flavour (chrome only, not part of the grid) */
  #screen{position:relative}
  .glasscover{pointer-events:none;position:relative}
</style>
</head>
<body>
  <h1>Boiling Point · terminal preview</h1>
  <div class="sub">a ratatui-faithful sketch — real cell buffer, real palette, width-1 glyphs only</div>

  <div class="toolbar">
    <button class="tab on" data-scene="playing">Playing · live inspector</button>
    <button class="tab" data-scene="depile">The Depile</button>
    <button class="tab" data-scene="boom">The Boom</button>
    <button class="tab" data-scene="codex">Codex</button>
    <button class="rbtn" id="replay">▶ Replay anim</button>
  </div>

  <div class="term">
    <div class="titlebar">
      <span class="dot d1"></span><span class="dot d2"></span><span class="dot d3"></span>
      <span class="t" id="termtitle">boiling-point — playing — 96×32</span>
    </div>
    <pre id="screen" tabindex="0"></pre>
  </div>
  <div class="hintline" id="hint">←/→ move cursor · click a card · ↵ commit · the inspector explains the selected card</div>

<script>
"use strict";
// ── palette: the real truecolor values from tui-client/src/palette.rs ───────
const C = {
  bg:'#0d0c10', fg:'#cfc6b4', dim:'#6b6253',
  ruby:'#dc3246', sapphire:'#3c78e6', emerald:'#32be6e', amethyst:'#b464dc', wild:'#bebebe',
  ember:'#e68c28', emberHot:'#ff6b1a', emberDim:'#8a3f15', brewBg:'#7c3712', bubble:'#ffd98a',
  teal:'#78c8c8', brass:'#c69749', brassLt:'#ecd39a', iron:'#241c14', ironLt:'#3a3128',
  shadow:'#3c3c48', red:'#dc3246', green:'#32be6e', yellow:'#e6c84a', magenta:'#c884d6',
};
const COLS=96, ROWS=32;

// player colours shown by SHAPE as well as hue (palette.rs: triangle/heart/circle/square/lion)
const PLAYER = {
  Ruby:    {s:'▲', c:C.ruby,     n:'Ruby'},
  Sapphire:{s:'♥', c:C.sapphire, n:'Sapphire'},
  Emerald: {s:'●', c:C.emerald,  n:'Emerald'},
  Amethyst:{s:'■', c:C.amethyst, n:'Amethyst'},
  Wild:    {s:'★', c:C.wild,     n:'Wild'},
};
// effects — width-1 geometric sigils stand in for the shipping client's emoji
const EFFECT = {
  Peek:      {s:'◉', name:'Peek',           vol:2, pts:1, color:'Ruby',     vis:'Announced — table sees "someone peeked".',
    text:"Privately learn the cauldron's exact boiling point. The one window into the blind pot."},
  Dampen:    {s:'◇', name:'Dampen',         vol:1, pts:0, color:'Sapphire', vis:'Silent until the depile.',
    text:"Cools the brew: -2 total volatility (net -1 after its own). A safety valve near the edge."},
  Surge:     {s:'◆', name:'Volatile Surge', vol:3, pts:0, color:'Emerald',  vis:'Silent until the depile.',
    text:"A weapon. Adds +2 over its base 3 - 5 effective - shoving the pot toward the edge."},
  Copycat:   {s:'◍', name:'Copycat',        vol:1, pts:1, color:'Amethyst', vis:'Silent until the depile.',
    text:"Becomes the highest-point colour already in the pot (Wild if empty). Bandwagon."},
  Shield:    {s:'▣', name:'Shield',         vol:2, pts:0, color:'Amethyst', vis:'Silent until the depile.',
    text:"No explosion loss this round - but if it resolves safely you forfeit ALL scoring. A bet."},
  Expose:    {s:'◌', name:'Expose',         vol:1, pts:0, color:'Sapphire', vis:'Announced - reveals a card.',
    text:"Flip one random face-down pot card up for the whole table. Information warfare."},
  Recall:    {s:'◖', name:'Recall',         vol:1, pts:0, color:'Ruby',     vis:'Partly visible - the pot count drops.',
    text:"Pull one of your own earlier cards back to hand. The Recall card itself stays."},
  DoubleDown:{s:'◈', name:'Double Down',    vol:2, pts:0, color:'Emerald',  vis:'Silent until the depile.',
    text:"Doubles the pot points of its own colour from earlier waves. A huge dominance swing."},
};
const MODS = [
  {s:'Residue',   tag:'physics', text:'The cauldron starts hotter - leftover heat from last round.'},
  {s:'Thin Ice',  tag:'physics', text:'Boiling point LOWER - explosions far likelier.'},
  {s:'Deep Cauldron',tag:'physics',text:'Boiling point HIGHER - explosions rare.'},
  {s:'Bountiful', tag:'scoring', text:'Every card adds to the pot value (colourless). Fatter pots & bigger booms.'},
  {s:'2x Stakes', tag:'scoring', text:'All pot points doubled - the win AND the loss.'},
  {s:'Reversal',  tag:'wild',    text:'The LOWEST colour present in the pot wins instead of the highest.'},
];

// ── the cell buffer (a tiny ratatui) ────────────────────────────────────────
class Screen{
  constructor(cols,rows){this.cols=cols;this.rows=rows;const n=cols*rows;
    this.ch=new Array(n);this.fg=new Array(n);this.bg=new Array(n);this.bo=new Array(n);this.clear();}
  clear(bg=C.bg){for(let i=0;i<this.cols*this.rows;i++){this.ch[i]=' ';this.fg[i]=C.fg;this.bg[i]=bg;this.bo[i]=false;}}
  set(x,y,c,fg=C.fg,bg,bo=false){if(x<0||y<0||x>=this.cols||y>=this.rows)return;const i=y*this.cols+x;
    this.ch[i]=c;this.fg[i]=fg;if(bg!==undefined)this.bg[i]=bg;this.bo[i]=bo;}
  text(x,y,str,{fg=C.fg,bg,bo=false}={}){for(let k=0;k<str.length;k++)this.set(x+k,y,str[k],fg,bg,bo);}
  hline(x,y,w,c,fg,bg){for(let k=0;k<w;k++)this.set(x+k,y,c,fg,bg);}
  fillBg(x,y,w,h,bg){for(let j=0;j<h;j++)for(let k=0;k<w;k++){const i=(y+j)*this.cols+(x+k);
    if(i>=0&&i<this.ch.length)this.bg[i]=bg;}}
  box(x,y,w,h,{fg=C.fg,bg,rounded=false,double=false}={}){
    const tl=double?'╔':rounded?'╭':'┌',tr=double?'╗':rounded?'╮':'┐',
          bl=double?'╚':rounded?'╰':'└',br=double?'╝':rounded?'╯':'┘',
          hz=double?'═':'─',vt=double?'║':'│';
    this.set(x,y,tl,fg,bg);this.set(x+w-1,y,tr,fg,bg);
    this.set(x,y+h-1,bl,fg,bg);this.set(x+w-1,y+h-1,br,fg,bg);
    for(let k=1;k<w-1;k++){this.set(x+k,y,hz,fg,bg);this.set(x+k,y+h-1,hz,fg,bg);}
    for(let j=1;j<h-1;j++){this.set(x,y+j,vt,fg,bg);this.set(x+w-1,y+j,vt,fg,bg);}
  }
  render(el){
    const esc=s=>s==='&'?'&amp;':s==='<'?'&lt;':s==='>'?'&gt;':s;
    let html='';
    for(let y=0;y<this.rows;y++){
      let row='',rf=null,rb=null,ro=null,run='';
      const flush=()=>{if(run!=='')row+=`<span style="color:${rf};background:${rb}${ro?';font-weight:700':''}">${run}</span>`;run='';};
      for(let x=0;x<this.cols;x++){const i=y*this.cols+x;
        if(this.fg[i]!==rf||this.bg[i]!==rb||this.bo[i]!==ro){flush();rf=this.fg[i];rb=this.bg[i];ro=this.bo[i];}
        run+=esc(this.ch[i]);}
      flush();html+=row+(y<this.rows-1?'\n':'');
    }
    el.innerHTML=html;
  }
}
function mix(a,b,t){const p=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
  const[ar,ag,ab]=p(a),[br,bg,bb]=p(b);const r=Math.round(ar+(br-ar)*t),g=Math.round(ag+(bg-ag)*t),bl=Math.round(ab+(bb-ab)*t);
  return '#'+[r,g,bl].map(v=>v.toString(16).padStart(2,'0')).join('');}
function wrap(str,w){const words=str.split(' ');const lines=[];let cur='';
  for(const wd of words){if((cur+' '+wd).trim().length>w){lines.push(cur.trim());cur=wd;}else cur+=' '+wd;}
  if(cur.trim())lines.push(cur.trim());return lines;}

// ── shared widgets ──────────────────────────────────────────────────────────
function header(s, modNew=true){
  s.text(1,0,' BREW-7K3F   Round 4/5 · Wave 3',{fg:C.fg,bo:true});
  const tags=[['[Residue]',false],['[ThinIce]',false],['[Bountiful]',modNew]];
  let x=COLS-1-tags.reduce((a,[t])=>a+t.length+1,0);
  for(const[t,nw] of tags){s.text(x,0,t,{fg:nw?C.brassLt:C.magenta,bo:nw});x+=t.length+1;}
  s.hline(0,1,COLS,'─',C.dim);
}
function drawCard(s,x,y,card,sel){
  const w=12,h=5,pc=PLAYER[card.color];
  // soft drop shadow (mirrors draw_card in ui.rs)
  for(let sy=y+1;sy<=y+h;sy++)s.set(x+w,sy,'░',C.shadow);
  for(let sx=x+1;sx<=x+w;sx++)s.set(sx,y+h,'░',C.shadow);
  const bcol=sel?C.brassLt:pc.c, ibg=sel?mix(pc.c,C.bg,.78):C.bg;
  s.fillBg(x+1,y+1,w-2,h-2,ibg);
  s.box(x,y,w,h,{fg:bcol,bg:sel?ibg:C.bg,rounded:!sel,double:sel});
  s.set(x+1,y,String(card.vol),C.emberHot,sel?ibg:C.bg,true);      // loud volatility in the top edge
  const icon=card.eff?EFFECT[card.eff].s:pc.s, iconC=card.eff?C.brassLt:pc.c;
  s.set(x+2,y+1,icon,iconC,ibg,true);
  s.text(x+4,y+1,card.short.slice(0,7),{fg:C.fg,bg:ibg});
  s.text(x+1,y+2,'▒'.repeat(w-2),{fg:mix(pc.c,C.bg,.45),bg:ibg});   // colour band — reads at a glance
  const pips='●'.repeat(card.pts)+'○'.repeat(3-card.pts);
  s.text(x+2,y+3,pips,{fg:C.brassLt,bg:ibg});
  s.text(x+8,y+3,card.pts+'p',{fg:C.dim,bg:ibg});
}
function inspector(s,y,card,cursorPass){
  const x=4,w=88,h=6;
  s.box(x,y,w,h,{fg:C.brass,rounded:true});
  let title, head, lines, vis, sig, sigC;
  if(cursorPass){
    title=' INSPECT · ✕ Pass '; sig='✕'; sigC=C.dim;
    head='you commit nothing this wave';
    lines=wrap("Pass and you are LOCKED OUT for the rest of the round - no more cards, no more say. You still lose the pot if it blows. Folding dodges commitment pressure, not the blast.",w-4);
    vis='';
  } else if(card.eff){
    const e=EFFECT[card.eff];const pc=PLAYER[card.color];
    sig=e.s;sigC=C.brassLt;title=' INSPECT · '+e.s+' '+e.name+' ';
    head=`${pc.n} · volatility ${card.vol}${card.eff==='Surge'?' (+2 → 5 effective)':''} · ${card.pts} point${card.pts===1?'':'s'}`;
    lines=wrap(e.text,w-4); vis=e.vis;
  } else {
    const pc=PLAYER[card.color];sig=pc.s;sigC=pc.c;title=' INSPECT · '+pc.s+' '+pc.n+' ingredient ';
    head=`${pc.n} · volatility ${card.vol} · ${card.pts} points · no effect`;
    lines=wrap("Pure points - fattens the pot for whoever wins it (and the boom for everyone). Helps no colour dominate.",w-4);
    vis='';
  }
  // title coloured into the top border; recolour just the sigil cell in place
  s.text(x+2,y,title,{fg:C.brass});
  s.set(x+2+title.indexOf(sig),y,sig,sigC,undefined,true);
  s.text(x+2,y+1,head,{fg:PLAYER[card?card.color:'Wild']?PLAYER[(card&&card.color)||'Wild'].c:C.fg});
  let ly=y+2;
  for(const ln of lines.slice(0,2)) s.text(x+2,ly++,ln,{fg:C.fg});
  if(vis) s.text(x+2,y+h-1>ly?ly:y+4,vis,{fg:C.teal});
}

// ── SCENE: playing ───────────────────────────────────────────────────────────
const HAND=[
  {color:'Ruby',    vol:2,pts:1,eff:'Peek',   short:'Peek'},
  {color:'Sapphire',vol:1,pts:0,eff:'Dampen', short:'Dampen'},
  {color:'Emerald', vol:3,pts:0,eff:'Surge',  short:'Surge'},
  {color:'Amethyst',vol:1,pts:1,eff:'Copycat',short:'Copycat'},
  {color:'Wild',    vol:1,pts:3,eff:null,     short:'Wild'},
];
const state={cursor:2, t0:performance.now()};
const HANDX=i=>4+i*13, PASSX=4+5*13;

function drawOpp(s,x,name,sig,sc,score,chips,chipc,statusline,statusc,dim){
  const w=29,h=5,a=dim?.5:1;
  s.box(x,3,w,h,{fg:dim?C.dim:C.brass,rounded:true});
  s.set(x+2,3,sig,dim?C.dim:sc,undefined,true);
  s.text(x+4,3,' '+name+' ',{fg:dim?C.dim:C.fg,bo:!dim});
  s.text(x+w-1-(''+score).length-1,3,' '+score,{fg:dim?C.dim:C.brassLt,bo:true});
  s.text(x+2,4,chips,{fg:dim?C.dim:chipc});
  s.text(x+2+chips.length+1,4,statusline,{fg:dim?C.dim:statusc});
}
function cauldron(s,now){
  const cx=39,top=9;                              // pot ~18 wide centred
  // steam — drifts, sparse, teal (ambient: identical at vol 2 or 13)
  const ph=Math.floor(now/180);
  for(let k=0;k<5;k++){const sx=cx+3+((k*4+ph)%12);const g='·˚∙'[ (k+ph)%3 ];
    if((k+ph)%2===0)s.set(sx,top,g,C.teal);}
  // rim
  s.set(cx,top+1,'▗',C.brass);s.hline(cx+1,top+1,16,'▄',C.brass);s.set(cx+17,top+1,'▖',C.brass);
  // brew surface (ember bg) with rising bubbles
  s.set(cx,top+2,'▐',C.brass,C.bg);s.fillBg(cx+1,top+2,16,1,C.brewBg);s.set(cx+17,top+2,'▌',C.brass,C.bg);
  for(let k=0;k<16;k++){let g=' ';const r=(Math.sin((k*1.7)+ph*0.9)+1)/2;
    if(r>0.78)g='O';else if(r>0.62)g='o';else if(r>0.5)g='°';
    if(g!==' ')s.set(cx+1+k,top+2,g,C.bubble,C.brewBg,true);}
  // body
  s.set(cx,top+3,'▐',C.brass,C.bg);s.fillBg(cx+1,top+3,16,1,C.iron);
  s.text(cx+1,top+3,'▒'.repeat(16),{fg:C.ironLt,bg:C.iron});s.set(cx+17,top+3,'▌',C.brass,C.bg);
  // base + under-glow (ember, pulsing)
  const glow=mix(C.emberHot,C.bg,0.4+0.25*Math.sin(now/400));
  s.set(cx,top+4,'▝',glow);s.hline(cx+1,top+4,16,'▀',glow);s.set(cx+17,top+4,'▘',glow);
  // captions
  const cap='~ ~ T H E   C A U L D R O N ~ ~';
  s.text(Math.floor((COLS-cap.length)/2),top+5,cap,{fg:C.teal});
  const meta='6 cards simmering  ·  volatility ?? / ??';
  s.text(Math.floor((COLS-meta.length)/2),top+6,meta,{fg:C.dim});
  const blind='[ hidden by design ]';
  s.text(Math.floor((COLS-blind.length)/2),top+7,blind,{fg:mix(C.brass,C.bg,.4)});
}
function scenePlaying(s,now){
  s.clear();
  header(s);
  drawOpp(s,1,'Vael','♥',C.sapphire,17,'▮▮▮','#3c78e6','3 in pot · scheming',C.dim,false);
  drawOpp(s,33,'Moss','●',C.emerald,9,'▮',C.emerald,'1 · deciding…',C.teal,false);
  drawOpp(s,65,'Ix','■',C.amethyst,11,'▮▮',C.amethyst,'passed · locked out',C.dim,true);
  cauldron(s,now);
  // self status line
  const sy=17;
  s.set(1,sy,'▲',C.ruby,undefined,true);s.text(2,sy,' You · Ruby',{fg:C.ruby,bo:true});
  s.text(16,sy,'score 13',{fg:C.fg});
  // ticking timer (faithful: a number + shrinking bar)
  const left=Math.max(0,8-Math.floor((now-state.t0)/1000)%9);
  s.text(28,sy,`time 0:0${left}`,{fg:C.yellow});
  const bw=8,fill=Math.round(bw*left/8);
  s.set(39,sy,'▕',C.dim);s.text(40,sy,'█'.repeat(fill)+'░'.repeat(bw-fill),{fg:C.ember});s.set(40+bw,sy,'▏',C.dim);
  s.text(54,sy,'● choose a card or pass',{fg:C.brass});
  // cursor marker
  const cmx=(state.cursor>=5?PASSX:HANDX(state.cursor))+5;
  s.set(cmx,18,'▼',C.brassLt,undefined,true);
  // hand
  HAND.forEach((c,i)=>drawCard(s,HANDX(i),19,c,i===state.cursor));
  // pass slot
  const px=PASSX,sel=state.cursor>=5;
  for(let sy2=20;sy2<=24;sy2++)s.set(px+6,sy2,'░',C.shadow);
  for(let sx=px+1;sx<=px+6;sx++)s.set(sx,24,'░',C.shadow);
  s.box(px,19,6,5,{fg:sel?C.brassLt:C.dim,rounded:!sel,double:sel});
  s.text(px+1,20,' P',{fg:sel?C.brassLt:C.dim,bo:sel});s.text(px+1,21,'ass',{fg:sel?C.brassLt:C.dim});
  // live inspector
  inspector(s,25,sel?null:HAND[state.cursor],sel);
  // footer
  s.hline(0,31,COLS,'─',mix(C.brass,C.bg,.6));
  s.text(1,31,'←/→ move · ↵ commit · p pass · L lock-in · e emote · ? codex',{fg:C.dim});
}

// ── SCENE: depile ─────────────────────────────────────────────────────────────
const REVEAL=[ // last-played first; Surge (i0) crosses bp 9, pushing the pot to 14
  {color:'Emerald', vol:3,eff:'Surge', owner:'Moss', oc:C.emerald,  run:14, crossed:true},
  {color:'Ruby',    vol:2,eff:null,    owner:'Vael', oc:C.sapphire, run:9,  traitor:true},
  {color:'Amethyst',vol:2,eff:null,    owner:'Ix',   oc:C.amethyst, run:7},
  {color:'Sapphire',vol:3,eff:null,    owner:'Vael', oc:C.sapphire, run:5},
  {color:'Ruby',    vol:2,eff:null,    owner:'You',  oc:C.ruby,     run:2},
];
let depT0=performance.now();
function sceneDepile(s,now){
  s.clear();
  header(s);
  s.text(2,3,'THE DEPILE — revealing last-played first',{fg:C.brassLt,bo:true});
  // volatility bar (allowed post-round): total 14, bp 9
  const bx=2,bw=COLS-16,bp=9,total=14,scale=14;
  s.box(bx,5,bw+2,3,{fg:C.dim,rounded:true});
  const t=(now-depT0)/1000;
  const shown=Math.min(REVEAL.length,Math.floor(t/0.55));
  const curVol = shown===0?0:REVEAL[REVEAL.length-Math.min(shown,REVEAL.length)] ? 0:0;
  // running value = the run of the most-recently revealed card (reveal order)
  const lastIdx=Math.min(shown,REVEAL.length)-1;
  const val=lastIdx>=0?REVEAL[lastIdx].run:0;
  const fill=Math.round(bw*val/scale);
  for(let k=0;k<bw;k++){const past=k>=Math.round(bw*bp/scale);
    s.set(bx+1+k,6,k<fill?'█':'░',k<fill?(k>=Math.round(bw*bp/scale)?C.red:C.ember):C.ironLt);}
  const thx=bx+1+Math.round(bw*bp/scale);
  s.set(thx,5,'┬',C.red);s.set(thx,6,'│',C.red);s.set(thx,7,'┴',C.red);
  s.text(thx+1,5,' boiling point 9',{fg:'#ff9aa6'});
  s.text(bx+bw-3,6,String(val).padStart(2),{fg:'#fff',bo:true});

  // reveal row — cards flip last-first
  REVEAL.forEach((c,i)=>{
    const x=4+i*18, y=10, w=14, h=8;
    const revT=i*0.55;
    const open=t>=revT;
    if(!open){ // face-down back
      s.box(x,y,w,h,{fg:C.brass,rounded:true});
      for(let j=1;j<h-1;j++)s.text(x+1,y+j,'▚'.repeat(w-2),{fg:mix(C.brass,C.bg,.6)});
      s.set(x+Math.floor(w/2),y+Math.floor(h/2),'⌬',C.brass,undefined,true);
      return;
    }
    const flip=t<revT+0.18; // brief squeeze frame
    const pc=PLAYER[c.color], bcol=c.crossed?C.red:pc.c;
    if(flip){ s.box(x+Math.floor(w/2)-1,y,3,h,{fg:bcol,rounded:true}); return; }
    s.box(x,y,w,h,{fg:bcol,rounded:true});
    if(c.crossed){s.text(x,y-1,'⚡ crossed here',{fg:'#ff9aa6',bo:true});}
    s.set(x+1,y,String(c.vol),C.emberHot,undefined,true);
    const icon=c.eff?EFFECT[c.eff].s:pc.s;
    s.set(x+2,y+2,icon,c.eff?C.brassLt:pc.c,undefined,true);
    s.text(x+4,y+2,c.eff?EFFECT[c.eff].name.slice(0,8):pc.n,{fg:C.fg});
    s.text(x+2,y+4,'▒'.repeat(w-4),{fg:mix(pc.c,C.bg,.45)});
    s.text(x+2,y+6,'vol → '+c.run,{fg:c.crossed?C.red:C.ember,bo:c.crossed});
    if(c.traitor)s.set(x+w-2,y,'!',C.red,undefined,true);
    // owner
    s.text(x,y+h,(c.owner==='You'?'▶ ':'· ')+c.owner+(c.traitor?' (is Blue!)':''),{fg:c.traitor?'#ff9aa6':C.dim});
  });
  s.hline(0,31,COLS,'─',mix(C.brass,C.bg,.6));
  if(shown>=REVEAL.length)
    s.text(1,31,'You needed 9 — the pot hit 14. Moss\'s Surge tipped it. (Safe brews keep the boiling point hidden.)',{fg:C.dim});
  else
    s.text(1,31,'revealing… ↵/space to skip',{fg:C.dim});
}

// ── SCENE: boom ───────────────────────────────────────────────────────────────
let boomT0=performance.now();
const GLYPH={ // 5-row block letters
  B:["█████ ","█   █ ","████  ","█   █ ","█████ "],
  O:["█████ ","█   █ ","█   █ ","█   █ ","█████ "],
  M:["█   █ ","██ ██ ","█ █ █ ","█   █ ","█   █ "],
};
function sceneBoom(s,now){
  s.clear('#140a06');
  const t=(now-boomT0)/1000;
  const shake=t<0.6?Math.round(Math.sin(t*60)* (1)) :0;
  const sy=t<0.6?(Math.floor(t*50)%2?1:0):0;
  // expanding ring
  const cx=48,cy=13,rad=t*60;
  for(let a=0;a<360;a+=6){const rx=Math.round(cx+Math.cos(a*Math.PI/180)*rad*0.9);
    const ry=Math.round(cy+Math.sin(a*Math.PI/180)*rad*0.45);
    if(rad>2&&rad<60)s.set(rx,ry,'·',mix(C.ember,'#140a06',Math.min(1,rad/60)));}
  // word BOOM
  const word="BOOM",lw=6,total=word.length*lw,x0=Math.floor((COLS-total)/2)+shake,y0=8+sy;
  const grow=Math.min(1,t/0.4);
  for(let li=0;li<word.length;li++){const g=GLYPH[word[li]];
    for(let r=0;r<5;r++){if(r/5>grow)continue;
      const col=mix('#ffffff',C.emberHot,Math.min(1,t));
      s.text(x0+li*lw,y0+r,g[r],{fg:col,bo:true});}}
  s.text(Math.floor((COLS-40)/2),y0+6,'the cauldron erupts — the pot was worth 14',{fg:'#ffc59a'});
  // loss tiles
  const tiles=[['You','-14',C.red],['Vael','-14',C.red],['Moss','-14',C.red],['Ix · ▣ shielded','0',C.teal]];
  let tx=Math.floor((COLS-(tiles.length*16))/2);
  if(t>0.5)for(const[nm,d,dc] of tiles){s.box(tx,y0+8,15,4,{fg:C.dim,rounded:true});
    s.text(tx+2,y0+9,nm.slice(0,12),{fg:C.fg});s.text(tx+2,y0+10,d,{fg:dc,bo:true});tx+=16;}
  // sparks
  for(let k=0;k<14;k++){const ang=k*0.45, r=t*70*(0.5+(k%3)*0.25);
    const px=Math.round(cx+Math.cos(ang)*r), py=Math.round(cy+Math.sin(ang)*r*0.5);
    if(t<1.1)s.set(px,py,'✦'.length?'*':'*',mix('#ffd98a','#140a06',Math.min(1,t)));}
  s.hline(0,31,COLS,'─',mix(C.brass,C.bg,.6));
  s.text(1,31,'everyone eats the loss — even Ix, who folded. Ix shielded on the bet it would blow. It blew.',{fg:C.dim});
}

// ── SCENE: codex ──────────────────────────────────────────────────────────────
function sceneCodex(s){
  s.clear();
  header(s,false);
  s.text(2,3,'CODEX — every effect & modifier, always one keystroke away ( ? )',{fg:C.brassLt,bo:true});
  s.text(2,5,'SPECIAL EFFECTS  · ~1 in 4 cards',{fg:C.ember});
  const keys=Object.keys(EFFECT);
  keys.forEach((k,i)=>{const e=EFFECT[k];const col=i%2, row=Math.floor(i/2);
    const x=2+col*47, y=7+row*4;
    s.box(x,y,45,4,{fg:mix(C.brass,C.bg,.5),rounded:true});
    s.set(x+2,y+1,e.s,C.brassLt,undefined,true);
    s.text(x+4,y+1,e.name,{fg:C.fg,bo:true});
    s.text(x+18,y+1,`vol ${e.vol} · ${e.pts}p`,{fg:C.dim});
    wrap(e.text,41).slice(0,2).forEach((ln,j)=>s.text(x+2,y+2+j,ln,{fg:C.dim}));
  });
  s.text(2,24,'CAULDRON MODIFIERS  · stack each round (direction only — magnitudes stay server-side)',{fg:C.ember});
  MODS.forEach((m,i)=>{const x=2+(i%3)*31, y=26+Math.floor(i/3)*3;
    const tc=m.tag==='physics'?'#9fd8ff':m.tag==='scoring'?'#ffd98a':'#e8a6ff';
    s.box(x,y,30,3,{fg:mix(C.brass,C.bg,.5),rounded:true});
    s.text(x+2,y+1,m.s,{fg:C.fg,bo:true});
    s.text(x+2+m.s.length+1,y+1,wrap(m.text,30-m.s.length-4)[0],{fg:C.dim});
    s.text(x+30-m.tag.length-2,y,m.tag,{fg:tc});
  });
}

// ── driver ────────────────────────────────────────────────────────────────────
const scr=new Screen(COLS,ROWS);
const el=document.getElementById('screen');
const SCENES={playing:scenePlaying, depile:sceneDepile, boom:sceneBoom, codex:sceneCodex};
let scene='playing';
function frame(){const now=performance.now();
  (SCENES[scene]||scenePlaying)(scr,now);scr.render(el);requestAnimationFrame(frame);}
requestAnimationFrame(frame);

// tabs
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  t.classList.add('on');scene=t.dataset.scene;
  document.getElementById('termtitle').textContent='boiling-point — '+scene+' — 96×32';
  if(scene==='depile')depT0=performance.now();
  if(scene==='boom')boomT0=performance.now();
  const hints={playing:'←/→ move cursor · click a card · ↵ commit · the inspector explains the selected card',
    depile:'cards flip last-played first; the crossing card cracks',
    boom:'everyone loses the pot — folding does not save you',
    codex:'the reference the TUI can surface on ?'};
  document.getElementById('hint').textContent=hints[scene];
  el.focus();
}));
document.getElementById('replay').addEventListener('click',()=>{
  if(scene==='depile')depT0=performance.now();
  else if(scene==='boom')boomT0=performance.now();
  else {state.t0=performance.now();}
  el.focus();
});

// keyboard: live inspector navigation (the terminal-native "tooltip")
el.addEventListener('keydown',e=>{
  if(scene!=='playing')return;
  if(e.key==='ArrowLeft'){state.cursor=(state.cursor+5)%6;e.preventDefault();}
  else if(e.key==='ArrowRight'){state.cursor=(state.cursor+1)%6;e.preventDefault();}
  else if(e.key>='1'&&e.key<='5'){state.cursor=+e.key-1;e.preventDefault();}
  else if(e.key==='p'||e.key==='P'){state.cursor=5;e.preventDefault();}
});
// click a card to select (maps pixel → cell, like terminal mouse mode)
el.addEventListener('click',e=>{
  if(scene!=='playing')return;
  const r=el.getBoundingClientRect();
  const cw=(r.width-28)/COLS, col=Math.floor((e.clientX-r.left-14)/cw);
  for(let i=0;i<5;i++){if(col>=HANDX(i)&&col<HANDX(i)+12){state.cursor=i;return;}}
  if(col>=PASSX&&col<PASSX+6)state.cursor=5;
});
window.addEventListener('load',()=>el.focus());
</script>
